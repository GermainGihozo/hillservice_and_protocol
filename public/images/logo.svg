  <!-- Sun rays -->
  <line x1="512" y1="200" x2="512" y2="140" stroke="#f4d03f" stroke-width="4" stroke-linecap="round"/>
  <line x1="450" y1="220" x2="410" y2="180" stroke="#f4d03f" stroke-width="4" stroke-linecap="round"/>
  <line x1="574" y1="220" x2="614" y2="180" stroke="#f4d03f" stroke-width="4" stroke-linecap="round"/>
  <line x1="430" y1="250" x2="380" y2="230" stroke="#f4d03f" stroke-width="3" stroke-linecap="round"/>
  <line x1="594" y1="250" x2="644" y2="230" stroke="#f4d03f" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Sun circle -->
  <circle cx="512" cy="240" r="45" fill="#f4d03f"/>
  
  <!-- Roots/Mountain base -->
  <path d="M400 480 L420 500 L440 485 L460 505 L480 490 L500 510 L520 495 L540 515 L560 500 L580 520 L600 505 L620 525" 
