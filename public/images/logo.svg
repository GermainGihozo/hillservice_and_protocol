  <!-- Decorative arrows -->
  <path d="M310 680 L340 690 L310 700" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M714 680 L684 690 L714 700" fill="none" stroke="#fff" stroke-width="2"/>
